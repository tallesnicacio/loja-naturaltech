<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#FB6E13">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>PDV operador - Natural Tech</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Setup inicial: nome do vendedor + identificacao do tablet -->
  <div id="setup" class="setup hidden">
    <h1>Bem-vindo 💚</h1>
    <p>Antes de começar, identifique-se:</p>
    <div class="field req"><label>Seu nome (vendedor)</label><input id="su-operador" placeholder="Ex.: Ana"></div>
    <div class="field req"><label>Identificação do tablet</label><input id="su-device" placeholder="Ex.: Tablet 1"></div>
    <button class="btn laranja" id="su-ok">Começar a vender</button>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="brand">TRUE<small id="event-name">Natural Tech</small></div>
      <div class="spacer"></div>
      <div class="operador">Vendedor: <b id="op-nome">—</b> · <span id="op-device">—</span></div>
      <button class="linkbtn" id="trocar">trocar</button>
      <a class="linkbtn" href="/">loja</a> <a class="linkbtn" href="/admin">admin</a>
    </div>

    <div class="pdv">
      <!-- Catalogo -->
      <section class="painel">
        <h2>Produtos</h2>
        <input id="busca" class="search" placeholder="Buscar produto..." autocomplete="off">
        <div id="produtos" class="produtos"></div>
      </section>

      <!-- Carrinho + checkout -->
      <aside class="painel">
        <h2>Pedido</h2>
        <div id="cart" class="cart"><div class="cart-empty">Toque num produto para adicionar</div></div>

        <div class="totais">
          <div class="row"><span>Subtotal</span><span id="t-subtotal">R$ 0,00</span></div>
          <div class="field" style="margin-top:8px"><label>Desconto (R$)</label><input id="desconto" type="number" min="0" step="0.01" value="0" inputmode="decimal"></div>
          <div class="row grand"><span>TOTAL</span><span id="t-total">R$ 0,00</span></div>
        </div>

        <h2 style="margin-top:18px">Cliente</h2>
        <div class="field req"><label>CPF</label><input id="c-cpf" inputmode="numeric" placeholder="Só números"></div>
        <div class="field req"><label>Nome</label><input id="c-nome" placeholder="Nome do cliente"></div>
        <div class="field"><label>E-mail</label><input id="c-email" type="email" inputmode="email" placeholder="para receber novidades"></div>
        <div class="field"><label>Telefone</label><input id="c-tel" inputmode="tel" placeholder="(00) 00000-0000"></div>

        <h2 style="margin-top:18px">Pagamento</h2>
        <div class="pagamentos" id="pagamentos">
          <button class="pag" data-forma="credito">Crédito</button>
          <button class="pag" data-forma="debito">Débito</button>
          <button class="pag" data-forma="pix">Pix</button>
          <button class="pag" data-forma="dinheiro">Dinheiro</button>
        </div>
        <div class="field" id="nsu-field" style="margin-top:10px"><label>NSU / Autorização (maquininha)</label><input id="c-nsu" placeholder="Código da maquininha"></div>

        <button class="btn verde" id="finalizar" disabled>Finalizar venda</button>
        <button class="btn ghost" id="limpar" style="margin-top:8px">Cancelar pedido</button>
      </aside>
    </div>
  </div>

  <!-- Modal de sucesso -->
  <div id="modal" class="overlay hidden">
    <div class="modal">
      <h2>Venda concluída! 🎉</h2>
      <div class="num" id="m-num">#0</div>
      <p id="m-total"></p>
      <button class="btn laranja" id="m-imprimir">Imprimir comprovante</button>
      <button class="btn verde" id="m-nova" style="margin-top:8px">Nova venda</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/pdv.js"></script><script src="/js/cliente-form.js"></script>
</body>
</html>
